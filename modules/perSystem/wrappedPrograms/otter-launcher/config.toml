[general]
default_module = "br"

empty_module = "a"

# Command to run commands
exec_cmd = "bash -c"

vi_mode = true
esc_to_abort = true

cheatsheet_entry = "?"
cheatsheet_viewer = "nvim -R"
clear_screen_after_execution = false

loop_mode = false

external_editor = "nvim"

delay_startup = 0

callback = ""

[interface]
header = """
\u001B[34;1m  \u001B[0m$USER@$(printf $HOSTNAME)\u001B[0m$(printf '\u001B[999C\u001B[14D')\u001B[31m\u001B[0m $(mpstat | awk 'FNR ==4 {print $4}') \u001B[33m󰍛\u001B[0m $(free -h | awk 'FNR == 2 {print $3}' | sed 's/i//')
"""
header_cmd = ""
header_cmd_trimmed_lines = 0

# Text in the input bar
place_holder = "search"

# Layout
suggestion_mode = "list"
 separator = """
$( \
    text="    modules"; \
    printf "\u001B[0;90m$text \
    $(printf -v line '%*s' \"$(( COLUMNS - $(printf "$text" | wc -m) - 3 ))\" ''; printf '%s' \"${line// /─}\")" \
)
"""
footer = ""

suggestion_lines = 10
list_prefix = "    "
selection_prefix = "  \u001B[32;1m"
prefix_padding = 3

default_module_message = "    \u001B[33msearch\u001B[0m with brave"
empty_module_message = ""

customized_list_order = false

indicator_with_arg_module = ""
indicator_no_arg_module = ""

# Colors
prefix_color = "\u001B[33m"
description_color = "\u001B[39m"
place_holder_color = "\u001B[0m"
hint_color = "\u001B[30m"

# Move interface
move_interface_right = 0
move_interface_down = 0

[overlay]
overlay_cmd = ""
overlay_trimmed_lines = 0
overlay_height = 0
move_overlay_right = 0
move_overlay_down = 0

[[modules]]
description = "launch with fsel"
prefix = "a"
cmd = "fsel --detach -ss {}"
with_argument = true
unbind_proc = true

[[modules]]
description = "launch app directly"
prefix = "app"
cmd = "fsel --detach -p {}"
with_argument = true
unbind_proc = true

[[modules]]
description = "brave search"
prefix = "br"
cmd = "xdg-open https://search.brave.com/search?q='{}'"
with_argument = true
url_encode = true
unbind_proc = true

[[modules]]
description = "run commands"
prefix = "sh"
cmd = """
bash -c "{}"
"""
with_argument = true
unbind_proc = true

[[modules]]
description = "search packages"
prefix = "pac"
cmd = "nh search {}"
with_argument = true
unbind_proc = true

