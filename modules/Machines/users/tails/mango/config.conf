# Misc
xwayland_persistence=1
syncobj_enable=0
no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=1
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
circle_layout=tile,scroller
enable_floating_snap=1
snap_distance=50
cursor_size=24
cursor_theme=Bibata-Modern-Classic
cursor_hide_timeout=0
drag_tile_to_tile=1
single_scratchpad = 1

exec-once=~/.config/mango/start.sh

# sub config load
source=./rule.conf
source=./env.conf
source=./apperance.conf
source=./peripherals/keyboard.conf
source=./peripherals/monitors.conf
source=./peripherals/trackpad.conf
source=./layouts/master-stack.conf
source=./layouts/overview.conf
source=./layouts/scroller.conf
source=./binds/binds.conf
